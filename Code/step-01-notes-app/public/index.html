<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes App - MCP Workshop</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Personal Notes</h1>
      <p class="subtitle">MCP Workshop - Step 01</p>
    </header>

    <!-- Add Note Form -->
    <section class="card">
      <h2>Add Note</h2>
      <form id="add-note-form">
        <div class="form-group">
          <textarea id="note-content" placeholder="Write your note here..." required></textarea>
        </div>
        <div class="form-group">
          <input type="text" id="note-tags" placeholder="Tags (comma-separated, e.g., work, ideas)">
        </div>
        <button type="submit" class="btn btn-primary">Add Note</button>
      </form>
    </section>

    <!-- Search -->
    <section class="card">
      <h2>Search</h2>
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search notes...">
        <button id="search-btn" class="btn">Search</button>
        <button id="clear-btn" class="btn btn-secondary">Clear</button>
      </div>
    </section>

    <!-- Notes List -->
    <section class="card">
      <h2>Your Notes <span id="notes-count"></span></h2>
      <div id="notes-container">
        <p class="loading">Loading notes...</p>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
